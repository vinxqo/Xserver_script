name: XServer Extend Schedule

on:
  schedule:
    - cron: '0 0 1 * *'    # Day 1  00:00  ← 新周期
    - cron: '0 13 2 * *'   # Day 2  13:00  +37h
    - cron: '0 2 4 * *'    # Day 4  02:00  +37h
    - cron: '0 15 5 * *'   # Day 5  15:00  +37h
    - cron: '0 4 7 * *'    # Day 7  04:00  +37h
    - cron: '0 18 8 * *'   # Day 8  18:00  +38h ──┐
    - cron: '0 7 10 * *'   # Day 10 07:00  +37h   │均匀分布
    - cron: '0 20 11 * *'  # Day 11 20:00  +37h   │的4个
    - cron: '0 9 13 * *'   # Day 13 09:00  +37h   │38h间隔
    - cron: '0 22 14 * *'  # Day 14 22:00  +37h   │
    - cron: '0 12 16 * *'  # Day 16 12:00  +38h ──┘
    - cron: '0 1 18 * *'   # Day 18 01:00  +37h
    - cron: '0 14 19 * *'  # Day 19 14:00  +37h
    - cron: '0 3 21 * *'   # Day 21 03:00  +37h
    - cron: '0 16 22 * *'  # Day 22 16:00  +37h
    - cron: '0 6 24 * *'   # Day 24 06:00  +38h
    - cron: '0 19 25 * *'  # Day 25 19:00  +37h
    - cron: '0 8 27 * *'   # Day 27 08:00  +37h
    - cron: '0 21 28 * *'  # Day 28 21:00  +37h
    - cron: '0 10 30 * *'  # Day 30 10:00  +37h → 下月 Day 1 00:00 = +38h
  workflow_dispatch:

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chrome

    - name: Run Extension Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: node action.js

    - name: Upload Screenshots
      if: always() # Run even if the script fails
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "*.png"
        retention-days: 5
        
    - name: Keepalive
      run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
