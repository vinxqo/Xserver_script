name: Keep Alive

on:
  schedule:
    - cron: '0 0 * * *'  # 初始值，会被自动覆盖
  workflow_dispatch:

permissions:
  contents: write   # ✅ 正确

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chrome

    - name: Run Extension Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: node action.js

    - name: Upload Screenshots
      if: always() # Run even if the script fails
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "*.png"
        retention-days: 5

    - name: 计算下次运行时间并更新 cron
      run: |
          env:        
            GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}  # 改用 PAT
          # 当前时间 + 36小时
          NEXT=$(date -u -d '+36 hours' '+%M %H %d %m')
          MINUTE=$(echo $NEXT | awk '{print $1}')
          HOUR=$(echo $NEXT | awk '{print $2}')
          DAY=$(echo $NEXT | awk '{print $3}')
          MONTH=$(echo $NEXT | awk '{print $4}')

          NEW_CRON="${MINUTE} ${HOUR} ${DAY} ${MONTH} *"
          echo "下次运行: $NEW_CRON"

          # 替换 yml 中的 cron 行
          sed -i "s|cron: '.*'|cron: '${NEW_CRON}'|" .github/workflows/schedule.yml

    - name: 提交更新
      run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/schedule.yml
          git commit -m "chore: 更新下次保活时间 [skip ci]"
          git push
