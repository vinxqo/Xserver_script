name: XServer Extend Schedule

on:
  schedule:
    - cron: '0 0 * * 1'   # 周一 00:00
    - cron: '0 18 * * 2'  # 周二 18:00  +42h
    - cron: '0 12 * * 4'  # 周四 12:00  +42h
    - cron: '0 6 * * 6'   # 周六 06:00  +42h
    # 周六 06:00 → 下周一 00:00 = +42h ✓
  workflow_dispatch:

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chrome

    - name: Run Extension Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: node action.js

    - name: Upload Screenshots
      if: always() # Run even if the script fails
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "*.png"
        retention-days: 5

    - name: Keepalive
      run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
